name: Train Taxonomy

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at 00:00
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Run Trainer
        run: uv run trainer.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update taxonomy from live sources"
          title: "Automated Taxonomy Training Update"
          body: "This PR updates the taxonomy.json with the latest trending tags from StackOverflow and GitHub."
          branch: "automated/train-taxonomy"
          delete-branch: true
