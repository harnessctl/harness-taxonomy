name: Scheduled Taxonomy Training

on:
  schedule:
    - cron: '0 0 * * 0' # Weekly on Sunday at 00:00
  workflow_dispatch:

jobs:
  train-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Run Trainer
        run: |
          uv venv
          uv pip install httpx
          uv run trainer.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Commit and Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # If trainer modified the JSON, commit it so semantic-release picks it up
          if [[ -n $(git status -s taxonomy.json) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add taxonomy.json
            git commit -m "feat(data): automated weekly taxonomy expansion from live sources"
            # Note: semantic-release will process this new commit and trigger a release
            npx semantic-release
          else
            echo "No new trends found to update."
          fi
