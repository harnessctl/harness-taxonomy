name: Release Taxonomy

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: 'pyproject.toml'

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Force Latest Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Ensure files exist before attempting release
          if [[ -f "taxonomy.msgpack.zst" && -f "taxonomy_terms.tar.gz" ]]; then
            # Delete old latest release and tag if they exist
            gh release delete latest --cleanup-tag -y || true
            # Create a new latest release with the freshly built files
            gh release create latest taxonomy.msgpack.zst taxonomy_terms.tar.gz --title "Latest Release" --notes "Continuously updated latest alias." --latest
          else
            echo "Skipping latest update: No build artifacts found."
          fi
